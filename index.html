<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nexora Internship</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main">

    <div class="left">
        <h1>Nexora</h1>
        <p>Internship Application</p>
    </div>

    <div class="right">
        <form id="form" novalidate>

            <h2>Apply Now</h2>

            <div class="group">
                <select id="prefix" required>
                    <option value=""></option>
                    <option>Mr</option>
                    <option>Mrs</option>
                </select>
                <label class="active">Prefix</label>
            </div>

            <div class="group">
                <input type="text" id="fname" required>
                <label>First Name</label>
            </div>

            <div class="group">
                <input type="text" id="lname" required>
                <label>Last Name</label>
            </div>

            <div class="group">
                <input type="email" id="email" required>
                <label>Email</label>
            </div>

            <div class="group">
                <input type="text" id="username" required>
                <label>Username</label>
            </div>

            <div class="row">
                <div class="group">
                    <input type="date" id="dob" required>
                    <label class="active">DOB</label>
                </div>

                <div class="group">
                    <input type="number" id="age" readonly>
                    <label class="active">Age</label>
                </div>
            </div>

            <div class="group">
                <input type="tel" id="phone" maxlength="10" required>
                <label>Phone</label>
            </div>

            <div class="group">
                <input type="password" id="password" required>
                <label>Password</label>
                <span class="eye" onclick="togglePassword()">👁</span>

                <ul class="rules">
                    <li id="r-len">Min 8 chars</li>
                    <li id="r-upper">1 Uppercase</li>
                    <li id="r-lower">1 Lowercase</li>
                    <li id="r-num">1 Number</li>
                    <li id="r-sp">1 Special</li>
                </ul>
            </div>

            <div class="group">
                <input type="password" id="confirmPassword" required>
                <label>Confirm Password</label>
            </div>

            <div class="group">
                <select id="domain" required>
                    <option value=""></option>
                    <option>AI/ML</option>
                    <option>Web Dev</option>
                    <option>Data Science</option>
                </select>
                <label class="active">Domain</label>
            </div>

            <button type="submit">Submit</button>

        </form>
    </div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="popup-box">
        <h2>✅ Submitted Successfully</h2>
        <button onclick="closePopup()">OK</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
